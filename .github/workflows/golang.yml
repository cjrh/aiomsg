name: Go CI

on:
  push:
    branches:
      - master
    paths:
      - 'golang-lib/**'
      - 'tools/coverage/**'
      - '.github/workflows/golang.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'golang-lib/**'
      - 'tools/coverage/**'
      - '.github/workflows/golang.yml'

defaults:
  run:
    working-directory: golang-lib

jobs:
  test:
    name: Test, vet, fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v4
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test with coverage
        run: just coverage
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: golang-lib/coverage.lcov
          flag-name: go
