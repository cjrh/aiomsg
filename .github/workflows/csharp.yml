name: C# CI

on:
  push:
    branches:
      - master
    paths:
      - 'csharp-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/csharp.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'csharp-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/csharp.yml'

defaults:
  run:
    working-directory: csharp-lib

jobs:
  test:
    name: Build & test (dotnet test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # The library targets .NET 9.
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - uses: extractions/setup-just@v4
      # `just coverage` runs `dotnet test` under dotnet-coverage and converts
      # the Cobertura report to LCOV.
      - name: Test with coverage
        run: just coverage
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: csharp-lib/coverage.lcov
          flag-name: csharp
