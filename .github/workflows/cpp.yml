name: C++ CI

on:
  push:
    branches:
      - master
    paths:
      - 'cpp-lib-sync/**'
      - 'cpp-lib-async/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/cpp.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'cpp-lib-sync/**'
      - 'cpp-lib-async/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/cpp.yml'

jobs:
  test:
    name: Build & test (${{ matrix.dir }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # cpp-lib-async fetches standalone Asio via CMake FetchContent on first
        # configure; cpp-lib-sync has no extra dependency.
        dir: [cpp-lib-sync, cpp-lib-async]
    steps:
      - uses: actions/checkout@v7
      - name: Install coverage/build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libssl-dev
      - uses: extractions/setup-just@v4
      - name: Test with coverage
        run: just coverage
        working-directory: ${{ matrix.dir }}
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: ${{ matrix.dir }}/coverage.lcov
          flag-name: ${{ matrix.dir }}
          parallel: true

  finish-coverage:
    name: Finalize Coveralls
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
