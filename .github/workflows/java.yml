name: Java CI

on:
  push:
    branches:
      - master
    paths:
      - 'java-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/java.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'java-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/java.yml'

defaults:
  run:
    working-directory: java-lib

jobs:
  test:
    name: Build & test (Gradle/JUnit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # Java 21 is the floor (virtual threads); the build targets release 21.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: extractions/setup-just@v4
      # `just coverage` runs the JUnit 5 tests, JaCoCo, and LCOV conversion.
      - name: Test with coverage
        run: just coverage
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: java-lib/coverage.lcov
          flag-name: java
