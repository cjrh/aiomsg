name: C CI

on:
  push:
    branches:
      - master
    paths:
      - 'c-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/c.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'c-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/c.yml'

defaults:
  run:
    working-directory: c-lib

jobs:
  test:
    name: Build & test (CMake/CTest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install coverage/build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libssl-dev
      - uses: extractions/setup-just@v4
      # `just coverage` configures with CMake/Clang, runs CTest, and writes LCOV
      # for the protocol unit tests + the in-process TCP/TLS integration test.
      - name: Test with coverage
        run: just coverage
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: c-lib/coverage.lcov
          flag-name: c
