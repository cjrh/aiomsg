name: Zig CI

on:
  push:
    branches:
      - master
    paths:
      - 'zig-lib/**'
      - 'conformance/certs/**'
      - '.github/workflows/zig.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'zig-lib/**'
      - 'conformance/certs/**'
      - '.github/workflows/zig.yml'

defaults:
  run:
    working-directory: zig-lib

jobs:
  test:
    name: Build & test (zig build test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      # The library uses Zig 0.16's std.Io, so the version is pinned.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: extractions/setup-just@v4
      # `just test` runs `zig build test`: protocol unit tests + the in-process
      # TCP/TLS integration test.
      - name: Test
        run: just test
