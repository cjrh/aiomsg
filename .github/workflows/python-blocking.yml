name: Python (blocking) CI

on:
  push:
    branches:
      - master
    paths:
      - 'python-lib-blocking/**'
      - '.github/workflows/python-blocking.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'python-lib-blocking/**'
      - '.github/workflows/python-blocking.yml'

defaults:
  run:
    working-directory: python-lib-blocking

jobs:
  build:
    name: Test on Python ${{ matrix.python-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 3.14t is the free-threaded (no-GIL) build — the thread-per-connection
        # design is a first-class citizen there.
        python-version: ['3.11', '3.12', '3.13', '3.14', '3.14t']
        os: [ubuntu-latest, windows-latest, macOS-latest]
      fail-fast: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group test --python ${{ matrix.python-version }}
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: uv run --python ${{ matrix.python-version }} pytest tests/
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: uv run --python ${{ matrix.python-version }} pytest --cov=aiomsg_blocking --cov-report=lcov:coverage.lcov tests/
      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2
        with:
          file: python-lib-blocking/coverage.lcov
          flag-name: py-blocking-${{ matrix.python-version }}
          parallel: true

  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv run --group lint ruff check aiomsg_blocking tests

  finish-coverage:
    name: Finalize Coveralls
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
