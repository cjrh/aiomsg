name: JavaScript CI

on:
  push:
    branches:
      - master
    paths:
      - 'javascript-lib/**'
      - 'browser-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/javascript.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'javascript-lib/**'
      - 'browser-lib/**'
      - 'conformance/certs/**'
      - 'tools/coverage/**'
      - '.github/workflows/javascript.yml'

jobs:
  test:
    name: Test with coverage (${{ matrix.dir }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        dir: [javascript-lib, browser-lib]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: extractions/setup-just@v4
      # `just coverage` runs `node --test` with V8 coverage and writes LCOV.
      - name: Test with coverage
        run: just coverage
        working-directory: ${{ matrix.dir }}
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: ${{ matrix.dir }}/coverage.lcov
          flag-name: ${{ matrix.dir }}
          parallel: true

  finish-coverage:
    name: Finalize Coveralls
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
