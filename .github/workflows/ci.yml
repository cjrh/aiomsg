name: Python CI

on:
  push:
    branches:
      - master
    paths:
      - 'python-lib/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'python-lib/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: python-lib

jobs:
  build:
    name: Test on Python ${{ matrix.python-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, windows-latest, macOS-latest]
      fail-fast: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group test --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest --cov=aiomsg --cov-report=lcov:coverage.lcov tests/
      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2
        with:
          file: python-lib/coverage.lcov
          flag-name: py-${{ matrix.python-version }}
          parallel: true

  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv run --group lint ruff check aiomsg tests

  finish-coverage:
    name: Finalize Coveralls
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
