name: Rust async CI

on:
  push:
    branches:
      - master
    paths:
      - 'rust-lib-async/**'
      - '.github/workflows/rust-async.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'rust-lib-async/**'
      - '.github/workflows/rust-async.yml'

defaults:
  run:
    working-directory: rust-lib-async

jobs:
  test:
    name: Test, clippy, fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (no default features, TLS off)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: Test
        run: cargo test
